apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "simple-nginx-chart.fullname" . }}
data:
  index.html: |
    <html>
      <head>
        <title>{{ .Values.content.pageTitle }}</title>
      </head>
      <body>
        <h1>{{ .Values.content.heading }}</h1>
        <p>{{ .Values.content.message }}</p>
      </body>
    </html>

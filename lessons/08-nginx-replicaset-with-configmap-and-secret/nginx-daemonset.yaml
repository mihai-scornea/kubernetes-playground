apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-daemon-demo
spec:
  selector:
    matchLabels:
      app: nginx-daemon-demo
  template:
    metadata:
      labels:
        app: nginx-daemon-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index-config
data:
  index.html: |
    <html>
      <head>
        <title>ReplicaSet ConfigMap Example</title>
      </head>
      <body>
        <h1>Hello from the nginx ReplicaSet</h1>
        <p>This page comes from a ConfigMap mounted into every replica.</p>
      </body>
    </html>

apiVersion: v1
kind: ConfigMap
metadata:
  name: dual-nginx-config
data:
  index-one.html: |
    <html>
      <head>
        <title>Nginx One</title>
      </head>
      <body>
        <h1>Hello from nginx-one</h1>
        <p>This page comes from index-one.html in the ConfigMap.</p>
        <p>This container listens on port 8081.</p>
      </body>
    </html>
  index-two.html: |
    <html>
      <head>
        <title>Nginx Two</title>
      </head>
      <body>
        <h1>Hello from nginx-two</h1>
        <p>This page comes from index-two.html in the ConfigMap.</p>
        <p>This container listens on port 8082.</p>
      </body>
    </html>
  nginx-one.conf: |
    server {
        listen 8081;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
  nginx-two.conf: |
    server {
        listen 8082;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

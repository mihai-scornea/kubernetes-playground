apiVersion: v1
kind: Pod
metadata:
  name: shared-emptydir-pod
spec:
  volumes:
    - name: shared-data
      emptyDir: {}
  containers:
    - name: writer
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - trap 'exit 0' TERM; while true; do sleep 1; done
      volumeMounts:
        - name: shared-data
          mountPath: /shared
    - name: reader
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - trap 'exit 0' TERM; while true; do sleep 1; done
      volumeMounts:
        - name: shared-data
          mountPath: /shared

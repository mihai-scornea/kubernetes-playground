apiVersion: v1
kind: Pod
metadata:
  name: dual-nginx-pod
  labels:
    app: dual-nginx-pod
spec:
  volumes:
    - name: dual-nginx-config
      configMap:
        name: dual-nginx-config
  containers:
    - name: nginx-one
      image: nginx:1.25
      ports:
        - containerPort: 8081
      volumeMounts:
        - name: dual-nginx-config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index-one.html
        - name: dual-nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx-one.conf
    - name: nginx-two
      image: nginx:1.25
      ports:
        - containerPort: 8082
      volumeMounts:
        - name: dual-nginx-config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index-two.html
        - name: dual-nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx-two.conf

apiVersion: apps/v1
kind: Deployment
metadata:
  name: required-spread
spec:
  replicas: 3
  selector:
    matchLabels:
      app: required-spread
  template:
    metadata:
      labels:
        app: required-spread
    spec:
      containers:
        - name: required-spread
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - trap 'exit 0' TERM; while true; do sleep 1; done
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - required-spread
              topologyKey: kubernetes.io/hostname

apiVersion: v1
kind: Pod
metadata:
  name: mosquito
spec:
  tolerations:
    - key: fly-spray
      operator: Exists
      effect: NoExecute
  containers:
    - name: mosquito
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - trap 'exit 0' TERM; while true; do sleep 1; done
